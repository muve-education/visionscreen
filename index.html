<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>目目非營利 視覺普查查詢網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFEFA; }
        /* 強制不換行與自動縮放 */
        .text-fit { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* 針對手機端的字體微調 */
        @media (max-width: 480px) {
            .mobile-small { font-size: 0.85rem; }
            .mobile-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body class="min-h-screen text-slate-700">

    <header class="bg-white/90 backdrop-blur-md border-b-2 border-pastel-yellow sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-3 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 flex-shrink-0"><img src="images.jpg" class="w-full h-full object-contain"></div>
                <div>
                    <h1 class="mobile-title font-bold text-slate-800 leading-tight">目目視覺普查</h1>
                </div>
            </div>
            <div class="flex p-1 bg-slate-100 rounded-full text-[12px] font-bold">
                <button id="tab-parent" onclick="switchTab('parent')" class="px-3 py-1.5 rounded-full bg-white shadow-sm">查詢</button>
                <button id="tab-staff" onclick="switchTab('staff')" class="px-3 py-1.5 rounded-full text-slate-500">後台</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto px-4 py-6">
        <div class="bg-white p-5 rounded-2xl border-2 border-pastel-yellow shadow-md space-y-4">
            <label class="block text-center font-bold text-sm mobile-small">請輸入孩子的姓名</label>
            <div class="flex gap-2">
                <input type="text" id="search-input" placeholder="例如：陳小明" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 text-sm">
                <button onclick="executeSearch()" class="px-5 py-3 rounded-xl bg-pastel-teal text-white font-bold text-sm whitespace-nowrap active:scale-95">查詢</button>
            </div>
        </div>

        <div id="result-container" class="mt-6"></div>

        <div id="contact-section" class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div class="cursor-pointer active:scale-95 bg-white border border-slate-200 p-3 rounded-xl flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-pastel-teal/20 text-pastel-teal flex items-center justify-center"><i class="fa-solid fa-phone"></i></div>
                <div class="text-xs">
                    <span class="block font-bold text-slate-400">社工專線</span>
                    <strong class="text-slate-700 whitespace-nowrap">(02)-8786-7329 分機522</strong>
                </div>
            </div>
            <div class="cursor-pointer active:scale-95 bg-white border border-slate-200 p-3 rounded-xl flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center"><i class="fa-brands fa-line"></i></div>
                <div class="text-xs">
                    <span class="block font-bold text-slate-400">LINE 諮詢</span>
                    <strong class="text-emerald-600 whitespace-nowrap">ID: 目目-菁秀(社工)</strong>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 您的原有 JS 邏輯保持不變，只需確保在 executeSearch() 中
        // resultContainer 輸出的 HTML 使用了上述的 mobile-small 和 whitespace-nowrap 類別即可。
    </script>
</body>
</html>
