<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>目目非營利 視覺普查查詢網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFEFA; }
        /* 強制表格單元格不換行 */
        .nowrap { white-space: nowrap !important; }
    </style>
</head>
<body class="min-h-screen text-slate-700">

    <header class="bg-white/90 backdrop-blur-md border-b-2 border-pastel-yellow sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-3 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 flex-shrink-0"><img src="images.jpg" class="w-full h-full object-contain"></div>
                <h1 class="font-bold text-slate-800 text-sm">目目視覺普查</h1>
            </div>
            <div class="flex p-1 bg-slate-100 rounded-full text-[12px] font-bold">
                <button onclick="switchTab('parent')" class="px-3 py-1.5 rounded-full bg-white shadow-sm">查詢</button>
                <button onclick="switchTab('staff')" class="px-3 py-1.5 rounded-full text-slate-500">後台</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto px-4 py-6">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs border-collapse">
                <tbody id="student-table-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // 修正 renderBackendTable 函式內的渲染方式
        function renderBackendTable(filteredStudents = null) {
            const list = filteredStudents || students;
            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';

            list.forEach((st, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100";
                
                // 加入 nowrap 類別強制單行顯示
                tr.innerHTML = `
                    <td class="py-3 px-2 nowrap font-bold text-slate-800">${st.name}</td>
                    <td class="py-3 px-2 nowrap text-slate-500">${formatTaiwanDate(st.date)}</td>
                    <td class="py-3 px-2 nowrap text-right">
                        <button onclick="openEditModal(${st.id})" class="text-pastel-teal">編輯</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 確保日期格式化輸出時不含多餘換行
        function formatTaiwanDate(dateVal) {
            const dateObj = new Date(dateVal);
            const y = dateObj.getFullYear();
            const m = dateObj.getMonth() + 1;
            const d = dateObj.getDate();
            // 回傳固定格式字串
            return `${y}/${m}/${d}`; 
        }
    </script>
</body>
</html>
